name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: ashwnn
          template: classic
          base: header, activity, repositories, metadata
          config_display: regular
          config_timezone: America/Vancouver

          # plugin_lines: yes
